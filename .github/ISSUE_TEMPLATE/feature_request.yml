name: 功能建议
description: 提出一个新功能或改进建议
labels: ["建议"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！好的想法是项目进步的动力。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰简洁地描述你希望添加的功能
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 这个功能在什么场景下对你有用？解决了什么问题？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你设想的实现方式
      description: 如果你对实现有想法，可以在这里描述（可选）
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 现有替代方案
      description: 你目前是否有其他方式绕过或部分满足此需求？
    validations:
      required: false
