name: Bug 报告
description: 报告一个 Bug，帮助我们改进 Songloft
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量填写以下信息，这能帮助我们更快定位和修复问题。

  - type: input
    id: version
    attributes:
      label: Songloft 版本
      description: 服务端版本号（可在设置页面或 API `/api/v1/upgrade/check` 查看）
      placeholder: 例如 1.2.0
    validations:
      required: true

  - type: dropdown
    id: deploy
    attributes:
      label: 部署方式
      options:
        - Docker
        - 二进制直接运行
        - 其他
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 客户端平台
      description: 如果问题与客户端相关，请选择平台
      options:
        - Web（浏览器）
        - Android
        - iOS
        - Windows
        - macOS
        - Linux
        - 不涉及客户端
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述遇到的问题
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按步骤描述如何复现此问题
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你认为正确的行为应该是什么
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 如有相关日志输出或截图，请粘贴在此（Docker 用户可通过 `docker logs` 获取）
    validations:
      required: false
